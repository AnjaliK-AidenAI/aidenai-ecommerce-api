services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      MONGODB_URI: mongodb://mongo:27017/ecommerce
      JWT_SECRET: aidenai-jwt-secret-change-in-prod
      CORS_ORIGIN: "*"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
